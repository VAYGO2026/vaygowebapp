<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>VAYGO — Throw to Win</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;font-family:'DM Sans',sans-serif;overflow:hidden;touch-action:none;}

.app{width:100%;max-width:430px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:#000;}

/* FONDO COMPLETO */
.bg-full{position:absolute;inset:0;z-index:0;}
.bg-full img{width:100%;height:100%;object-fit:cover;opacity:0.6;}
.bg-full::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.1) 30%,rgba(0,0,0,0.5) 65%,rgba(0,0,0,0.98) 100%);}

/* MESA */
.table-layer{position:absolute;inset:0;z-index:2;pointer-events:none;}
.table-layer img{width:100%;height:100%;object-fit:cover;object-position:top;mix-blend-mode:screen;}

/* HEADER */
.header{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;}
.h-back{width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;text-decoration:none;cursor:pointer;}
.h-logo{text-align:center;}
.h-logo .name{font-family:'Anton',sans-serif;font-size:18px;color:#C9A84C;letter-spacing:4px;}
.h-logo .sub{font-size:7px;color:rgba(255,255,255,0.4);letter-spacing:2px;}
.h-chances{background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:5px 12px;text-align:center;}
.h-chances .cl{font-size:8px;color:rgba(255,255,255,0.5);letter-spacing:0.1em;display:block;margin-bottom:3px;}
.h-chances .cv{display:flex;gap:5px;justify-content:center;}
.chance-dot{width:13px;height:13px;border-radius:50%;background:#C9A84C;box-shadow:0 0 6px #C9A84C;transition:all 0.3s;}
.chance-dot.used{background:#333;box-shadow:none;}

/* HERO TEXT */
.hero-text{position:absolute;top:72px;left:16px;z-index:20;}
.hero-text .t1{font-family:'Anton',sans-serif;font-size:32px;color:#fff;line-height:1;letter-spacing:1px;text-shadow:0 2px 10px rgba(0,0,0,0.8);}
.hero-text .t2{font-family:'Anton',sans-serif;font-size:32px;color:#C9A84C;line-height:1;text-shadow:0 2px 10px rgba(0,0,0,0.8);}
.hero-text .desc{font-size:11px;color:rgba(255,255,255,0.7);margin-top:5px;line-height:1.4;}

/* GAME AREA — toda la pantalla menos nav */
.game-area{position:absolute;top:0;left:0;right:0;bottom:58px;z-index:5;}

/* VASOS — posicionados absolutamente sobre la mesa */
.cup{position:absolute;transform:translate(-50%,-50%);cursor:pointer;transition:filter 0.3s;}
.cup img{display:block;mix-blend-mode:screen;}
.cup.winner img{filter:brightness(1.5) drop-shadow(0 0 15px currentColor);}

/* CANVAS para pelota y trayectoria */
canvas{position:absolute;inset:0;width:100%;height:100%;z-index:15;pointer-events:none;}

/* MANO */
.hand{position:absolute;bottom:0;left:50%;transform:translateX(-50%);z-index:18;pointer-events:none;mix-blend-mode:screen;}
.hand img{height:180px;display:block;mix-blend-mode:screen;}

/* DRAG LABEL */
.drag-label{position:absolute;bottom:10px;left:0;right:0;z-index:20;text-align:center;font-size:10px;color:rgba(255,255,255,0.55);letter-spacing:0.15em;display:flex;align-items:center;justify-content:center;gap:8px;}

/* BOTTOM NAV */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;z-index:30;height:58px;background:rgba(0,0,0,0.92);border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:space-around;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 8px;}
.nav-item .ni{font-size:16px;}
.nav-item span{font-size:8px;color:rgba(255,255,255,0.35);letter-spacing:0.08em;}
.nav-center{background:linear-gradient(180deg,#C9A84C,#8B6914);border-radius:50%;width:46px;height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:-14px;box-shadow:0 0 0 3px rgba(0,0,0,0.9),0 0 0 4px rgba(201,168,76,0.4);}
.nav-center .nc-icon{font-size:15px;}
.nav-center .nc-label{font-size:7px;color:#fff;font-weight:700;letter-spacing:0.08em;}

/* PRIZE MODAL */
.prize-modal{position:absolute;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);}
.prize-modal.show{display:flex;}
.prize-box{background:#0D1520;border-radius:24px;padding:28px 22px;text-align:center;width:290px;border:2px solid #C9A84C;}
.prize-cup{width:130px;height:160px;object-fit:contain;margin:0 auto 10px;mix-blend-mode:screen;}
.prize-lbl{font-size:9px;color:#8BB8D8;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:4px;}
.prize-val{font-family:'Anton',sans-serif;font-size:38px;line-height:1;margin-bottom:4px;}
.prize-desc{font-size:12px;color:rgba(255,255,255,0.55);margin-bottom:18px;}
.prize-btn{background:linear-gradient(180deg,#C9A84C,#8B6914);border:none;border-radius:50px;padding:13px 0;color:#fff;font-family:'Anton',sans-serif;font-size:17px;letter-spacing:2px;cursor:pointer;width:100%;box-shadow:0 4px 0 #5A4008;}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- FONDO TROPICAL -->
  <div class="bg-full">
    <img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/bg-pong.png" alt=""/>
  </div>

  <!-- HEADER -->
  <div class="header">
    <a href="app.html" class="h-back">&#8249;</a>
    <div class="h-logo">
      <div class="name">VAYGO</div>
      <div class="sub">EXPLORE COZUMEL DIFFERENTLY</div>
    </div>
    <div class="h-chances">
      <span class="cl">CHANCES</span>
      <div class="cv">
        <div class="chance-dot" id="d0"></div>
        <div class="chance-dot" id="d1"></div>
        <div class="chance-dot" id="d2"></div>
      </div>
    </div>
  </div>

  <!-- HERO TEXT -->
  <div class="hero-text">
    <div class="t1">THROW</div>
    <div class="t2">TO WIN</div>
    <div class="desc">Bounce the ball<br>and land it in a cup!</div>
  </div>

  <!-- GAME AREA -->
  <div class="game-area" id="gameArea">

    <!-- MESA -->
    <div class="table-layer" id="tableLayer">
      <img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/table.png" alt="table"/>
    </div>

    <!-- VASOS — posicionados con CSS directo -->
    <div class="cup" id="cup0" style="width:17%;left:12%;top:22%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup1.png"/></div>
    <div class="cup" id="cup1" style="width:17%;left:27%;top:18%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup2.png"/></div>
    <div class="cup" id="cup2" style="width:17%;left:42%;top:14%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup3.png"/></div>
    <div class="cup" id="cup3" style="width:17%;left:57%;top:18%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup4.png"/></div>
    <div class="cup" id="cup4" style="width:17%;left:72%;top:22%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup5.png"/></div>
    <div class="cup" id="cup5" style="width:19%;left:25%;top:35%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup6.png"/></div>
    <div class="cup" id="cup6" style="width:21%;left:42%;top:31%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup7.png"/></div>
    <div class="cup" id="cup7" style="width:19%;left:59%;top:35%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup8.png"/></div>

    <!-- CANVAS para pelota y trail -->
    <canvas id="gc"></canvas>

    <!-- MANO -->
    <div class="hand" id="handEl">
      <img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/hand.png" alt="hand"/>
    </div>

    <!-- DRAG LABEL -->
    <div class="drag-label">← &nbsp; DRAG TO AIM &nbsp; →</div>

  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item" onclick="location.href='explore.html'"><div class="ni">🧭</div><span>EXPLORE</span></div>
    <div class="nav-item"><div class="ni">🎁</div><span>REWARDS</span></div>
    <div class="nav-center"><div class="nc-icon">🏆</div><div class="nc-label">PLAY</div></div>
    <div class="nav-item" onclick="location.href='app.html'"><div class="ni">📍</div><span>MAP</span></div>
    <div class="nav-item"><div class="ni">👤</div><span>PROFILE</span></div>
  </div>

  <!-- PRIZE MODAL -->
  <div class="prize-modal" id="prizeModal">
    <div class="prize-box" id="prizeBox">
      <img class="prize-cup" id="prizeCupImg" src="" alt=""/>
      <div class="prize-lbl">YOUR PRIZE</div>
      <div class="prize-val" id="prizeVal">20% OFF</div>
      <div class="prize-desc" id="prizeDesc">Show this to the staff to redeem</div>
      <button class="prize-btn" onclick="closePrize()">AWESOME! 🎉</button>
    </div>
  </div>

</div>

<script>
const BASE = 'https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/';

const PRIZES = [
  {prize:'FREE DRINK',     color:'#9B59FF', desc:'Enjoy a free drink on the house!',  src: BASE+'cup1.png'},
  {prize:'10% OFF',        color:'#3A7FFF', desc:'Get 10% off your entire bill!',      src: BASE+'cup2.png'},
  {prize:'PREMIUM DESSERT',color:'#FF9500', desc:'A premium dessert on us!',           src: BASE+'cup3.png'},
  {prize:'SPECIAL EXP.',   color:'#00E5CC', desc:'Unlock a special experience!',       src: BASE+'cup4.png'},
  {prize:'20% OFF',        color:'#FF3333', desc:'Get 20% off your bill!',             src: BASE+'cup5.png'},
  {prize:'FREE APPETIZER', color:'#33CC33', desc:'Enjoy a free appetizer!',            src: BASE+'cup6.png'},
  {prize:'VIP ACCESS',     color:'#FF4400', desc:'Unlock VIP treatment tonight!',      src: BASE+'cup7.png'},
  {prize:'SPIN AGAIN',     color:'#CC44FF', desc:'Try your luck one more time!',       src: BASE+'cup8.png'},
];

// Posiciones de vasos (% del game area)
// Row 1: 5 vasos arriba  Row 2: 3 vasos abajo
// CANVAS
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const ga = document.getElementById('gameArea');

function resizeCanvas(){
  canvas.width = ga.clientWidth;
  canvas.height = ga.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Estado
let chances = 3;
let phase = 'idle';
let aimPct = 0.5; // 0-1 horizontal
let ball = null;
let trail = [];
let winner = null;
let isDragging = false;
let lastTouchX = 0;

// Posición en px del cup ganador
function getCupCenter(i) {
  const el = document.getElementById('cup'+i);
  if(!el) return {x: canvas.width/2, y: canvas.height/2};
  const rect = el.getBoundingClientRect();
  const gaRect = ga.getBoundingClientRect();
  return {
    x: rect.left - gaRect.left + rect.width/2,
    y: rect.top  - gaRect.top  + rect.height/2,
  };
}

function updateHand() {
  const hand = document.getElementById('handEl');
  const W = ga.clientWidth;
  const offset = (aimPct - 0.5) * W * 0.55;
  hand.style.transform = `translateX(calc(-50% + ${offset}px))`;
}

function updateChances() {
  [0,1,2].forEach(i => {
    const d = document.getElementById('d'+i);
    if(d) d.classList.toggle('used', i >= chances);
  });
}

// DRAG
ga.addEventListener('touchstart', e => {
  if(phase !== 'idle') return;
  e.preventDefault();
  isDragging = true;
  lastTouchX = e.touches[0].clientX;
}, {passive:false});

ga.addEventListener('touchmove', e => {
  if(!isDragging) return;
  e.preventDefault();
  const dx = e.touches[0].clientX - lastTouchX;
  lastTouchX = e.touches[0].clientX;
  aimPct = Math.max(0.08, Math.min(0.92, aimPct + dx / ga.clientWidth));
  updateHand();
}, {passive:false});

ga.addEventListener('touchend', e => {
  if(!isDragging) return;
  isDragging = false;
  if(phase === 'idle' && chances > 0) launch();
});

ga.addEventListener('mousedown', e => { if(phase!=='idle') return; isDragging=true; lastTouchX=e.clientX; });
ga.addEventListener('mousemove', e => {
  if(!isDragging) return;
  const dx = e.clientX - lastTouchX; lastTouchX = e.clientX;
  aimPct = Math.max(0.08, Math.min(0.92, aimPct + dx/ga.clientWidth));
  updateHand();
});
ga.addEventListener('mouseup', () => { if(!isDragging) return; isDragging=false; if(phase==='idle'&&chances>0) launch(); });

// DRAW
function drawScene() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Trail
  if(trail.length > 1) {
    ctx.save();
    ctx.setLineDash([7,5]);
    for(let i=1;i<trail.length;i++){
      const p = i/trail.length;
      ctx.beginPath();
      ctx.moveTo(trail[i-1].x, trail[i-1].y);
      ctx.lineTo(trail[i].x, trail[i].y);
      ctx.strokeStyle = `rgba(255,220,100,${p*0.7})`;
      ctx.lineWidth = p*3.5;
      ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();
  }

  // Aim line cuando está idle
  if(phase === 'idle') {
    const startX = aimPct * canvas.width;
    const startY = canvas.height * 0.88;
    const endX = canvas.width * 0.5;
    const endY = canvas.height * 0.35;
    ctx.save();
    ctx.setLineDash([8,6]);
    ctx.strokeStyle = 'rgba(255,220,100,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.quadraticCurveTo(startX*0.7+endX*0.3, startY - 80, endX, endY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // Ball
  if(ball) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fillStyle = '#F0EDE8';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }
}

function launch() {
  if(chances <= 0 || phase !== 'idle') return;
  chances--;
  updateChances();
  phase = 'flying';

  // Elegir vaso ganador aleatorio
  const winIdx = Math.floor(Math.random() * 8);
  winner = winIdx;
  const tgt = getCupCenter(winIdx);

  const startX = aimPct * canvas.width;
  const startY = canvas.height * 0.86;
  const bounceX = startX + (tgt.x - startX) * 0.45 + (Math.random()-0.5)*30;
  const bounceY = canvas.height * 0.60;

  ball = {x: startX, y: startY, r: 14};
  trail = [];

  const T = 80;
  let f = 0;

  function animate() {
    trail.push({x:ball.x, y:ball.y});
    if(trail.length > 20) trail.shift();

    if(f < T/2) {
      const p = f/(T/2);
      const e = p<0.5?2*p*p:-1+(4-2*p)*p;
      ball.x = startX + (bounceX-startX)*e;
      ball.y = startY + (bounceY-startY)*e - Math.sin(p*Math.PI)*100;
      ball.r = 14 + 6*Math.sin(p*Math.PI);
    } else {
      const p = (f-T/2)/(T/2);
      const e = p<0.5?2*p*p:-1+(4-2*p)*p;
      ball.x = bounceX + (tgt.x-bounceX)*e;
      ball.y = bounceY + (tgt.y-bounceY)*e - Math.sin(p*Math.PI)*55;
      ball.r = 20 - 7*p;
    }

    drawScene();
    f++;

    if(f >= T) {
      ball = null;
      trail = [];
      phase = 'done';
      // Highlight vaso ganador
      const cupEl = document.getElementById('cup'+winIdx);
      if(cupEl) {
        cupEl.style.filter = `brightness(1.6) drop-shadow(0 0 20px ${PRIZES[winIdx].color})`;
        cupEl.style.transform = 'translate(-50%,-50%) scale(1.15)';
      }
      setTimeout(() => showPrize(winIdx), 500);
      return;
    }
    requestAnimationFrame(animate);
  }
  animate();
}

function showPrize(idx) {
  const p = PRIZES[idx];
  const box = document.getElementById('prizeBox');
  box.style.borderColor = p.color;
  document.getElementById('prizeVal').textContent = p.prize;
  document.getElementById('prizeVal').style.color = p.color;
  document.getElementById('prizeDesc').textContent = p.desc;
  document.getElementById('prizeCupImg').src = p.src;
  document.getElementById('prizeModal').classList.add('show');
}

function closePrize() {
  document.getElementById('prizeModal').classList.remove('show');
  // Reset vaso
  const cupEl = document.getElementById('cup'+winner);
  if(cupEl) {
    cupEl.style.filter = '';
    cupEl.style.transform = 'translate(-50%,-50%)';
  }
  ball = null; trail = [];
  phase = 'idle';
  drawScene();
}

// Init
updateHand();
updateChances();

setInterval(() => { if(phase==='idle') drawScene(); }, 1000/30);
</script>
</body>
</html>
