<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>VAYGO — Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#060E1C;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;}

.app{width:390px;height:100dvh;max-height:820px;background:#0A1628;border-radius:32px;overflow:hidden;display:flex;flex-direction:column;position:relative;}

/* STATUS BAR */
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 0;color:#fff;font-size:13px;font-weight:600;flex-shrink:0;}

/* SCREENS */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;transition:opacity 0.5s ease,transform 0.5s ease;}
.screen.hidden{opacity:0;pointer-events:none;transform:translateX(30px);}
.screen.exit{opacity:0;transform:translateX(-30px);}

/* ── SCREEN 0 — SPLASH ── */
#s0{background:#0A1628;justify-content:space-between;padding-bottom:40px;}
.splash-logo{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 16px 0;}
.splash-logo img{width:100%;max-width:390px;height:auto;display:block;}
.splash-bottom{width:100%;padding:0 24px;display:flex;flex-direction:column;gap:12px;}
.btn-primary{width:100%;background:linear-gradient(90deg,#FF2D7A,#FF8C00);border:none;border-radius:16px;padding:16px;color:#fff;font-family:'Anton',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;position:relative;box-shadow:0 4px 20px rgba(255,45,122,0.4);}
.btn-primary::after{content:'';position:absolute;top:3px;left:12px;right:12px;height:35%;background:rgba(255,255,255,0.15);border-radius:10px 10px 0 0;}
.btn-city{width:100%;background:linear-gradient(90deg,#FF2D7A,#FF8C00);border:none;border-radius:12px;padding:11px 16px;color:#fff;font-family:'Anton',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;position:relative;box-shadow:0 3px 12px rgba(255,45,122,0.35);display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-city::after{content:'';position:absolute;top:2px;left:10px;right:10px;height:35%;background:rgba(255,255,255,0.15);border-radius:8px 8px 0 0;}
.btn-city.btn-next{background:linear-gradient(90deg,#1A2E4A,#0D1E35);border:1px solid #2A4060;box-shadow:none;}
.btn-city.btn-next::after{display:none;}
.next-badge{font-size:8px;font-weight:800;color:#FFD700;letter-spacing:0.08em;margin-left:4px;}
.btn-secondary{width:100%;background:transparent;border:1.5px solid rgba(79,163,232,0.5);border-radius:16px;padding:12px;color:#4FA3E8;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.05em;}
.tagline{text-align:center;font-size:11px;color:#3B5070;padding-bottom:4px;}

/* ── SCREENS 1-4 — HOW IT WORKS ── */
.how-screen{background:#0A1628;padding:0;justify-content:flex-start;}

/* PROGRESS BAR */
.progress-bar{width:100%;padding:50px 24px 0;display:flex;gap:6px;flex-shrink:0;}
.progress-step{flex:1;height:3px;border-radius:4px;background:#1A2E4A;transition:background 0.3s;}
.progress-step.done{background:linear-gradient(90deg,#FF2D7A,#FF8C00);}
.progress-step.active{background:#4FA3E8;}

/* SLIDE CONTENT */
.slide-wrap{flex:1;display:flex;flex-direction:column;padding:16px 24px 0;overflow:hidden;}
.slide-num{font-size:11px;font-weight:700;color:#FF2D7A;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.slide-title{font-family:'Anton',sans-serif;font-size:26px;color:#fff;line-height:1.1;margin-bottom:6px;}
.slide-title span{color:#FF2D7A;}
.slide-sub{font-size:12px;color:#8BB8D8;line-height:1.6;margin-bottom:16px;}

/* MOCK SCREEN */
.mock-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;}
.mock{background:#0D1E35;border:1px solid #1A2E4A;border-radius:20px;overflow:hidden;position:relative;}

/* Slide 1 mock — categorías */
.mock-s1{width:300px;padding:14px;}
.mock-cats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.mock-cat{width:60px;height:64px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:1.5px solid;}
.mock-cat svg{width:20px;height:20px;}
.mock-cat span{font-size:8px;font-weight:700;letter-spacing:0.06em;}
.arrow-pulse{position:absolute;animation:arrowPulse 1.5s ease-in-out infinite;}
@keyframes arrowPulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.2);opacity:0.6;}}

/* Slide 2 mock — restaurante */
.mock-s2{width:300px;overflow:hidden;}
.mock-rest-img{width:100%;height:100px;object-fit:cover;display:block;}
.mock-rest-body{padding:10px 12px;}
.mock-rest-name{font-family:'Anton',sans-serif;font-size:16px;color:#fff;}
.mock-rest-meta{font-size:10px;color:#4FA3E8;margin-top:2px;}

/* Slide 3 mock — slot */
.mock-s3{width:300px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.mock-slot{background:linear-gradient(180deg,#1a0535,#0f0220);border:2px solid #8B5CF6;border-radius:12px;padding:8px;width:100%;}
.mock-reels{display:flex;gap:4px;}
.mock-reel{flex:1;height:40px;background:linear-gradient(180deg,#E8E0F0,#F5F0FF);border-radius:4px;display:flex;align-items:center;justify-content:center;}
.mock-reel span{font-family:'Anton',sans-serif;font-size:11px;}
.mock-spin{background:linear-gradient(90deg,#FF2D7A,#FF8C00);border:none;border-radius:20px;padding:8px 24px;color:#fff;font-family:'Anton',sans-serif;font-size:12px;letter-spacing:1px;animation:spinPulse 1.5s ease-in-out infinite;}
@keyframes spinPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,45,122,0.4);}50%{box-shadow:0 0 0 8px rgba(255,45,122,0);}}

/* Slide 4 mock — QR */
.mock-s4{width:300px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.mock-prize{font-family:'Anton',sans-serif;font-size:32px;color:#FF8C00;}
.mock-qr{background:#fff;padding:8px;border-radius:10px;width:100px;height:100px;display:flex;align-items:center;justify-content:center;}
.mock-qr svg{width:84px;height:84px;}
.mock-code{background:rgba(0,0,0,0.3);border-radius:8px;padding:4px 12px;}
.mock-code span{font-family:monospace;font-size:11px;font-weight:700;color:#fff;letter-spacing:2px;}
.mock-valid{font-size:10px;color:#4B6A85;}

/* NEON GLOW EFFECTS */
.neon-green{box-shadow:0 0 8px rgba(127,193,66,0.5);}
.neon-pink{box-shadow:0 0 8px rgba(255,45,122,0.5);}
.neon-orange{box-shadow:0 0 8px rgba(255,140,0,0.5);}
.neon-blue{box-shadow:0 0 8px rgba(79,163,232,0.5);}

/* NAV BOTTOM */
.slide-nav{width:100%;padding:16px 24px 32px;display:flex;gap:10px;flex-shrink:0;}
.btn-next{flex:1;background:linear-gradient(90deg,#FF2D7A,#FF8C00);border:none;border-radius:14px;padding:14px;color:#fff;font-family:'Anton',sans-serif;font-size:16px;letter-spacing:1px;cursor:pointer;box-shadow:0 4px 16px rgba(255,45,122,0.4);}
.btn-back{background:rgba(255,255,255,0.06);border:1px solid #1A2E4A;border-radius:14px;padding:14px 16px;color:#4FA3E8;font-size:13px;font-weight:600;cursor:pointer;}
.btn-skip{background:none;border:none;color:#3B5070;font-size:11px;cursor:pointer;text-decoration:underline;align-self:center;}
</style>
</head>
<body>
<div class="app">

  <div class="status-bar">
    <span>9:41</span>
    <span style="display:flex;gap:6px;align-items:center;">
      <svg width="14" height="11" viewBox="0 0 24 18" fill="none"><path d="M1 4C5.5 0.5 18.5 0.5 23 4" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M4.5 8C7.5 5.5 16.5 5.5 19.5 8" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M8 12C10 10.5 14 10.5 16 12" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16" r="2" fill="#fff"/></svg>
      <svg width="22" height="12" viewBox="0 0 28 14" fill="none"><rect x="0.5" y="0.5" width="24" height="13" rx="3" stroke="#fff" stroke-width="1.2"/><rect x="25" y="4" width="3" height="6" rx="1.5" fill="#fff"/><rect x="2" y="2" width="20" height="10" rx="2" fill="#fff"/></svg>
    </span>
  </div>

  <!-- SCREEN 0 — SPLASH -->
  <div class="screen" id="s0">
    <div class="splash-logo">
      <img src="https://raw.githubusercontent.com/vaygo2026/vaygowebapp/main/logo.png" alt="VAYGO"/>
    </div>
    <div class="splash-bottom">
      <div class="tagline">Spin. Win. Explore.</div>
      <div style="font-size:11px;font-weight:700;color:#8BB8D8;text-align:center;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;">Where are you?</div>
      <button class="btn-city" onclick="startCozumel()">Cozumel</button>
      <button class="btn-city btn-next" style="cursor:not-allowed;opacity:0.5;">Playa del Carmen <span class="next-badge">NEXT</span></button>
      <button class="btn-city btn-next" style="cursor:not-allowed;opacity:0.5;">Tulum <span class="next-badge">NEXT</span></button>
      <button class="btn-city btn-next" style="cursor:not-allowed;opacity:0.5;">Bacalar <span class="next-badge">NEXT</span></button>
      <button class="btn-city btn-next" style="cursor:not-allowed;opacity:0.5;">Cancún <span class="next-badge">NEXT</span></button>
    </div>
  </div>

</div>

<script>
function startCozumel() {
  window.location.href = 'app.html?city=cozumel';
}

function goTo(screen) {
  window.location.href = 'app.html?city=cozumel';
}
</script>
</body>
</html>
