*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#060E1C;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;}
.app{width:390px;height:100dvh;max-height:820px;background:#0A1628;border-radius:32px;overflow:hidden;display:flex;flex-direction:column;position:relative;}
.demo-bar{background:linear-gradient(90deg,#FF8C00,#FF2D7A);padding:7px 16px;display:none;align-items:center;justify-content:space-between;flex-shrink:0;}
.demo-bar.show{display:flex;}
.demo-bar span{font-size:11px;font-weight:700;color:#fff;letter-spacing:0.06em;}
.demo-bar button{font-size:11px;font-weight:700;color:#fff;background:rgba(0,0,0,0.25);border:none;border-radius:20px;padding:4px 12px;cursor:pointer;}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;flex-shrink:0;background:#0A1628;border-bottom:1px solid #1A2E4A;}
.back-btn{display:flex;align-items:center;gap:6px;cursor:pointer;background:rgba(79,163,232,0.1);border:1px solid rgba(79,163,232,0.25);border-radius:20px;padding:6px 12px;}
.back-btn svg{width:16px;height:16px;}
.back-btn span{font-size:11px;font-weight:600;color:#4FA3E8;}
.cat-title{font-family:'Anton',sans-serif;font-size:26px;color:#fff;letter-spacing:2px;}
.cat-icon-badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.cat-icon-badge svg{width:20px;height:20px;}
.subcats{display:flex;gap:8px;padding:12px 14px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.subcats::-webkit-scrollbar{display:none;}
.subcat-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid #1A2E4A;background:#0D1E35;color:#8BB8D8;font-size:11px;font-weight:600;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.subcat-btn.active{color:#fff;border-color:var(--cat-color);background:rgba(var(--cat-color-rgb),0.15);box-shadow:0 0 8px rgba(var(--cat-color-rgb),0.4);}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 14px 80px;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}
.section-label{font-size:11px;font-weight:500;color:#ffffff;letter-spacing:0.08em;text-transform:uppercase;margin:12px 0 10px 2px;}
.cards-grid{display:flex;flex-direction:column;gap:12px;}
.reward-card{background:#0D1E35;border:1px solid #1A2E4A;border-radius:16px;overflow:hidden;cursor:pointer;}
.reward-card.expanded{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:320px;z-index:100;border-radius:22px;background:#0D1520;overflow-y:auto;max-height:80vh;border:1px solid #2A4060;}
.card-inner{display:flex;flex-direction:row;align-items:center;}
.reward-img{width:100px;height:90px;object-fit:cover;display:block;flex-shrink:0;}
.reward-img-expanded{width:100%;height:175px;}
.reward-body{padding:8px 10px;flex:1;}
.reward-badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:2px 8px;font-size:8px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:4px;}
.reward-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px;line-height:1.2;}
.reward-discount{font-size:22px;font-weight:500;margin-bottom:6px;line-height:1;}
.reward-deal{background:linear-gradient(90deg,#FF2D7A,#FF8C00);border:none;border-radius:8px;padding:6px 12px;color:#fff;font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;}
.expanded-details{padding:0 14px 16px;display:none;}
.expanded-details.show{display:block;}
.detail-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:12px;color:#8BB8D8;line-height:1.4;}
.detail-row svg{width:14px;height:14px;flex-shrink:0;margin-top:2px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:99;}
.overlay.show{display:block;}
.bottom-nav{background:#0A1628;border-top:1px solid #1A2E4A;display:flex;justify-content:space-around;align-items:center;padding:10px 0 18px;flex-shrink:0;position:absolute;bottom:0;left:0;right:0;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 12px;}
.nav-icon-wrap{width:26px;height:26px;display:flex;align-items:center;justify-content:center;}
.nav-icon-wrap svg{width:22px;height:22px;}

const _urlParams = new URLSearchParams(window.location.search);
const _isDemo = _urlParams.get('demo') === 'true';
const _sessionDemo = sessionStorage.getItem('vaygo_demo') === '1' || localStorage.getItem('vaygo_demo') === '1';
const _demoExp = parseInt(sessionStorage.getItem('vaygo_demo_exp') || localStorage.getItem('vaygo_demo_exp') || '0');
const _sessionValid = _sessionDemo && Date.now() < _demoExp;

if(_isDemo && !_sessionValid){
  window.location.href = 'demo.html';
}
if(_isDemo && _sessionValid){
  document.getElementById('demoBanner').classList.add('show');
  document.getElementById('backBtn').setAttribute('onclick', "window.location.href='app.html?demo=true'");
}

function exitDemo(){
  if(confirm('¿Salir de la demo?')){
    sessionStorage.removeItem('vaygo_demo');
    sessionStorage.removeItem('vaygo_demo_exp');
    window.location.href = 'demo.html';
  }
}

}

const catKey = _urlParams.get('cat') || 'eat';
const cat = CATS[catKey] || CATS.eat;
let activeSub = cat.subcats[0];
let expandedId = null;

document.getElementById('catTitle').textContent = cat.title;
document.getElementById('catTitle').style.color = cat.color;
document.getElementById('catBadge').innerHTML = cat.icon;
document.getElementById('catBadge').style.cssText += `background:rgba(${cat.colorRgb},0.15);border-radius:10px;padding:6px;`;

function renderSubcats(){
  document.getElementById('subcats').innerHTML = cat.subcats.map(s=>`
    <div class="subcat-btn ${s===activeSub?'active':''}"
      style="--cat-color:${cat.color};--cat-color-rgb:${cat.colorRgb};"
      onclick="setSubcat('${s}')">${s}</div>
  `).join('');
}

function renderCards(){
  document.getElementById('sectionLabel').textContent = activeSub;
  const cards = cat.cards[activeSub] || [];
  document.getElementById('cardsGrid').innerHTML = cards.map((c,i)=>`
    <div class="reward-card" id="ecard${i}">
      <div class="card-inner" id="cardInner${i}">
        <img class="reward-img" id="eimg${i}" src="${c.img}" alt="${c.name}" onclick="openPhoto('${c.img}','${c.name}')" style="cursor:zoom-in;"/>
        <div class="reward-body">
          <div class="reward-badge" style="background:rgba(${cat.colorRgb},0.2);color:${cat.color};">${cat.title}</div>
          <div class="reward-name">${c.name}</div>
          <div class="reward-discount" style="color:${cat.color};">${c.discount}</div>
          <button class="reward-deal" onclick="expandCard(${i})">Get Deal</button>
        </div>
      </div>
    </div>
  `).join('');
}

function setSubcat(s){ activeSub=s; closeExpanded(); renderSubcats(); renderCards(); }

function expandCard(id){
  const card = (cat.cards[activeSub]||[])[id];
  if(!card) return;
  const restId = card.name.toLowerCase().replace(/[^a-z0-9]/g,'-');
  const p = new URLSearchParams({
    id:restId, name:card.name, cat:cat.title, color:cat.color,
    img:card.img, hours:card.hours||'9:00 am – 10:00 pm',
    expires:card.expires||'10:00 pm', location:card.location||'Cozumel, Mexico',
    subcat:activeSub, discount:card.discount,
    menu:card.menu||'', web:card.web||'', instagram:card.instagram||'',
    maps:card.maps||''
  });
  // ✅ Pasar demo=true si estamos en modo demo
  if(_isDemo && _sessionValid) p.set('demo','true');
  window.location.href = `restaurant.html?${p.toString()}`;
}

function closeExpanded(){
  if(expandedId===null) return;
  document.getElementById('ecard'+expandedId).classList.remove('expanded');
  document.getElementById('cardInner'+expandedId).style.flexDirection='row';
  document.getElementById('eimg'+expandedId).classList.remove('reward-img-expanded');
  document.getElementById('eimg'+expandedId).style.width='100px';
  document.getElementById('overlay').classList.remove('show');
  expandedId=null;
}

function setRating(n){
  document.getElementById('ratingInput').value=n;
  const labels=['','⭐ Poor','⭐⭐ Fair','⭐⭐⭐ Good','⭐⭐⭐⭐ Great','⭐⭐⭐⭐⭐ Excellent!'];
  document.getElementById('ratingVal').textContent=labels[n];
  const stars=document.getElementById('stars').children;
  for(let i=0;i<stars.length;i++) stars[i].style.opacity=i<n?'1':'0.3';
}

renderSubcats();
renderCards();
</script>
