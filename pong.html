<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>VAYGO — Throw to Win</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;font-family:'DM Sans',sans-serif;overflow:hidden;}

.app{width:100%;max-width:430px;height:100dvh;margin:0 auto;position:relative;overflow:hidden;background:#000;}

/* BG */
.bg{position:absolute;inset:0;z-index:0;}
.bg img{width:100%;height:100%;object-fit:cover;opacity:0.5;}
.bg-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.4) 0%,rgba(0,0,0,0.2) 40%,rgba(0,0,0,0.6) 70%,rgba(0,0,0,0.95) 100%);}

/* HEADER */
.header{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;}
.h-back{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:18px;text-decoration:none;}
.h-logo{text-align:center;}
.h-logo .name{font-family:'Anton',sans-serif;font-size:20px;color:#C9A84C;letter-spacing:4px;}
.h-logo .sub{font-size:7px;color:rgba(255,255,255,0.5);letter-spacing:3px;}
.h-chances{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:6px 12px;text-align:center;}
.h-chances .cl{font-size:8px;color:rgba(255,255,255,0.5);letter-spacing:0.1em;}
.h-chances .cv{display:flex;gap:5px;justify-content:center;margin-top:3px;}
.chance-dot{width:12px;height:12px;border-radius:50%;background:#C9A84C;transition:background 0.3s;}
.chance-dot.used{background:#333;}

/* HERO TEXT */
.hero-text{position:absolute;top:80px;left:20px;z-index:10;}
.hero-text .t1{font-family:'Anton',sans-serif;font-size:36px;color:#fff;line-height:1;letter-spacing:1px;}
.hero-text .t2{font-family:'Anton',sans-serif;font-size:36px;color:#C9A84C;line-height:1;}
.hero-text .desc{font-size:12px;color:rgba(255,255,255,0.7);margin-top:6px;line-height:1.4;}

/* GAME CANVAS AREA */
.game-wrap{position:absolute;top:0;left:0;right:0;bottom:60px;z-index:5;}
canvas{width:100%;height:100%;display:block;}

/* TABLE IMAGE */
.table-img{position:absolute;bottom:55px;left:0;right:0;z-index:4;pointer-events:none;}
.table-img img{width:100%;display:block;}

/* HAND */
.hand-wrap{position:absolute;bottom:55px;left:50%;transform:translateX(-50%);z-index:8;width:160px;pointer-events:none;transition:left 0.05s;mix-blend-mode:screen;}
.hand-wrap img{width:100%;display:block;mix-blend-mode:screen;}

/* DRAG LABEL */
.drag-label{position:absolute;bottom:70px;left:0;right:0;z-index:10;text-align:center;font-size:10px;color:rgba(255,255,255,0.6);letter-spacing:0.15em;display:flex;align-items:center;justify-content:center;gap:8px;}
.drag-arrow{font-size:14px;color:rgba(255,255,255,0.4);}

/* PRIZE REVEAL */
.prize-modal{position:absolute;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);}
.prize-modal.show{display:flex;}
.prize-box{background:#0D1520;border-radius:24px;padding:30px 24px;text-align:center;width:300px;border:2px solid #C9A84C;}
.prize-cup-img{width:120px;height:120px;object-fit:contain;margin:0 auto 12px;}
.prize-label{font-size:10px;color:#8BB8D8;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:6px;}
.prize-value{font-family:'Anton',sans-serif;font-size:42px;color:#C9A84C;line-height:1;margin-bottom:4px;}
.prize-desc{font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:20px;}
.prize-btn{background:linear-gradient(180deg,#C9A84C,#8B6914);border:none;border-radius:50px;padding:14px 40px;color:#fff;font-family:'Anton',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;width:100%;box-shadow:0 4px 0 #5A4008;}
.prize-btn:active{transform:translateY(2px);}

/* BOTTOM NAV */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;z-index:20;height:60px;background:rgba(0,0,0,0.9);border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:space-around;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 8px;}
.nav-item .ni{font-size:16px;}
.nav-item span{font-size:8px;color:rgba(255,255,255,0.4);letter-spacing:0.08em;}
.nav-center{background:linear-gradient(180deg,#C9A84C,#8B6914);border-radius:50%;width:48px;height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:-16px;box-shadow:0 0 0 3px rgba(0,0,0,0.9),0 0 0 4px rgba(201,168,76,0.4);}
.nav-center .nc-icon{font-size:16px;}
.nav-center .nc-label{font-size:7px;color:#fff;font-weight:700;letter-spacing:0.08em;}

/* CUPS LAYER */
.cups-layer{position:absolute;z-index:7;pointer-events:none;}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- BG -->
  <div class="bg">
    <img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/bg-pong.png" alt="bg"/>
    <div class="bg-overlay"></div>
  </div>

  <!-- HEADER -->
  <div class="header">
    <a href="app.html" class="h-back">&#8249;</a>
    <div class="h-logo">
      <div class="name">VAYGO</div>
      <div class="sub">EXPLORE COZUMEL DIFFERENTLY</div>
    </div>
    <div class="h-chances">
      <div class="cl">CHANCES</div>
      <div class="cv">
        <div class="chance-dot" id="d0"></div>
        <div class="chance-dot" id="d1"></div>
        <div class="chance-dot" id="d2"></div>
      </div>
    </div>
  </div>

  <!-- HERO TEXT -->
  <div class="hero-text">
    <div class="t1">THROW</div>
    <div class="t2">TO WIN</div>
    <div class="desc">Bounce the ball<br>and land it in a cup!</div>
  </div>

  <!-- GAME CANVAS -->
  <div class="game-wrap">
    <canvas id="gc"></canvas>
  </div>

  <!-- DRAG LABEL -->
  <div class="drag-label" id="dragLabel">
    <span class="drag-arrow">←</span>
    DRAG TO AIM
    <span class="drag-arrow">→</span>
  </div>

  <!-- HAND -->
  <div class="hand-wrap" id="handWrap">
    <img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/hand.png" alt="hand"/>
  </div>

  <!-- PRIZE MODAL -->
  <div class="prize-modal" id="prizeModal">
    <div class="prize-box" id="prizeBox">
      <img class="prize-cup-img" id="prizeCupImg" src="" alt="cup"/>
      <div class="prize-label">YOUR PRIZE</div>
      <div class="prize-value" id="prizeValue">20% OFF</div>
      <div class="prize-desc" id="prizeDesc">Show this to the staff to redeem</div>
      <button class="prize-btn" onclick="closePrize()">AWESOME! 🎉</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='explore.html'">
      <div class="ni">🧭</div>
      <span>EXPLORE</span>
    </div>
    <div class="nav-item">
      <div class="ni">🎁</div>
      <span>REWARDS</span>
    </div>
    <div class="nav-center">
      <div class="nc-icon">🏆</div>
      <div class="nc-label">PLAY</div>
    </div>
    <div class="nav-item" onclick="window.location.href='app.html'">
      <div class="ni">📍</div>
      <span>MAP</span>
    </div>
    <div class="nav-item">
      <div class="ni">👤</div>
      <span>PROFILE</span>
    </div>
  </div>

</div>

<script>
const BASE = 'https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/';
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  const app = document.getElementById('app');
  W = canvas.width = app.clientWidth;
  H = canvas.height = app.clientHeight;
}
resize();
window.addEventListener('resize', () => { resize(); drawScene(); });

const cupsImg = new Image();
cupsImg.src = BASE + 'cups.png';
const tableImg = new Image();
tableImg.src = BASE + 'table.png';
const ballImg = new Image();
ballImg.src = BASE + 'ball.png';

const PRIZES = [
  {prize:'FREE DRINK',    color:'#7B2FBE', desc:'Enjoy a free drink on the house!',   imgSrc: BASE+'cups.png'},
  {prize:'10% OFF',       color:'#1A5FA8', desc:'Get 10% off your entire bill!',       imgSrc: BASE+'cups.png'},
  {prize:'PREMIUM DESSERT',color:'#C9A84C',desc:'A premium dessert on us!',            imgSrc: BASE+'cups.png'},
  {prize:'SPECIAL EXP.',  color:'#1A9E8A', desc:'Unlock a special experience!',        imgSrc: BASE+'cups.png'},
  {prize:'20% OFF',       color:'#B22222', desc:'Get 20% off your bill!',              imgSrc: BASE+'cups.png'},
  {prize:'FREE APPETIZER',color:'#1A7A2A', desc:'Enjoy a free appetizer!',             imgSrc: BASE+'cups.png'},
  {prize:'VIP ACCESS',    color:'#CC3300', desc:'Unlock VIP treatment tonight!',       imgSrc: BASE+'cups.png'},
  {prize:'SPIN AGAIN',    color:'#6A3BBA', desc:'Try your luck one more time!',        imgSrc: BASE+'cups.png'},
];

// Cup positions (normalized 0-1)
const CUP_DEFS = [
  // Row 1 — 5 cups
  {nx:0.18,ny:0.30},{nx:0.33,ny:0.28},{nx:0.50,ny:0.26},{nx:0.67,ny:0.28},{nx:0.82,ny:0.30},
  // Row 2 — 2 cups + center
  {nx:0.28,ny:0.44},{nx:0.50,ny:0.42},{nx:0.72,ny:0.44},
];

let cups = [];
let ball = null;
let phase = 'idle'; // idle, aiming, flying, done
let chances = 3;
let dragX = null;
let aimX = 0.5;
let winner = null;
let trailPts = [];

function buildCups() {
  cups = CUP_DEFS.map((c, i) => ({
    ...c,
    prize: PRIZES[i % PRIZES.length],
    highlight: false,
  }));
}
buildCups();

function getCupPx(cup) {
  return { x: cup.nx * W, y: cup.ny * H };
}

function drawTable() {
  if(tableImg.complete && tableImg.naturalWidth > 0) {
    // Mesa de fondo
    const tH = H * 0.75;
    const tW = W;
    ctx.drawImage(tableImg, 0, H - tH * 1.1, tW, tH * 1.2);
  } else {
    // Fallback
    ctx.fillStyle = '#2A1A0A';
    ctx.fillRect(0, H*0.3, W, H*0.7);
  }
}

function drawCups() {
  if(!cupsImg.complete || cupsImg.naturalWidth === 0) return;

  // La imagen cups.png tiene múltiples vasos — los mostramos como overlay en posición
  const cupW = W * 0.18;
  const cupH = cupW * 1.3;

  cups.forEach((cup, i) => {
    const {x, y} = getCupPx(cup);

    if(cup.highlight) {
      ctx.save();
      ctx.shadowColor = cup.prize.color;
      ctx.shadowBlur = 30;
    }

    // Dibujar la imagen de cups completa recortada por vaso
    // Rows en la imagen: row0 tiene 4 vasos (top), row1 tiene 3, row2 tiene 2
    // Usamos la imagen completa escalada como sprite
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.drawImage(cupsImg, x - cupW/2, y - cupH*0.8, cupW, cupH);
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();

    if(cup.highlight) {
      ctx.restore();
      // Glow ring
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(x, y + cupH*0.1, cupW*0.55, cupW*0.18, 0, 0, Math.PI*2);
      ctx.strokeStyle = cup.prize.color;
      ctx.lineWidth = 3;
      ctx.setLineDash([4,3]);
      ctx.shadowColor = cup.prize.color;
      ctx.shadowBlur = 15;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    // Label
    ctx.save();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(8, cupW*0.14)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const lines = cup.prize.prize.split(' ');
    lines.forEach((l, li) => {
      ctx.fillText(l, x, y - cupH*0.35 + li * (cupW*0.16));
    });
    ctx.restore();
  });
}

function drawBall(bx, by, scale) {
  if(ballImg.complete && ballImg.naturalWidth > 0) {
    const r = 22 * scale;
    ctx.drawImage(ballImg, bx - r, by - r, r*2, r*2);
  } else {
    ctx.save();
    ctx.beginPath();
    ctx.arc(bx, by, 18*scale, 0, Math.PI*2);
    ctx.fillStyle = '#F0EDE8';
    ctx.fill();
    ctx.restore();
  }
}

function drawTrail() {
  if(trailPts.length < 2) return;
  ctx.save();
  ctx.setLineDash([6,5]);
  for(let i=1;i<trailPts.length;i++){
    const p = i/trailPts.length;
    ctx.beginPath();
    ctx.moveTo(trailPts[i-1].x, trailPts[i-1].y);
    ctx.lineTo(trailPts[i].x, trailPts[i].y);
    ctx.strokeStyle = `rgba(255,255,200,${p*0.7})`;
    ctx.lineWidth = p*3;
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

function drawAimLine() {
  if(phase !== 'idle') return;
  const startX = aimX * W;
  const startY = H * 0.82;
  const targetX = W/2;
  const targetY = H * 0.35;
  const dx = targetX - startX;

  ctx.save();
  ctx.setLineDash([8,6]);
  ctx.strokeStyle = 'rgba(255,255,200,0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(startX, startY);
  ctx.bezierCurveTo(startX + dx*0.2, startY - 60, targetX - dx*0.2, targetY + 60, targetX, targetY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawScene() {
  ctx.clearRect(0, 0, W, H);
  drawTable();
  drawAimLine();
  drawTrail();
  drawCups();
  if(ball) drawBall(ball.x, ball.y, ball.scale || 1);
}

function updateHand() {
  const hw = document.getElementById('handWrap');
  const pct = aimX * 100;
  hw.style.left = `calc(${pct}% - 80px)`;
}

// DRAG / TOUCH
const app = document.getElementById('app');
app.addEventListener('touchstart', onDown, {passive:false});
app.addEventListener('touchmove', onMove, {passive:false});
app.addEventListener('touchend', onUp, {passive:false});
app.addEventListener('mousedown', onDown);
app.addEventListener('mousemove', onMove);
app.addEventListener('mouseup', onUp);

function getX(e) {
  if(e.touches) return e.touches[0].clientX;
  return e.clientX;
}

function onDown(e) {
  if(phase !== 'idle') return;
  e.preventDefault();
  dragX = getX(e);
  phase = 'aiming';
}

function onMove(e) {
  if(phase !== 'aiming') return;
  e.preventDefault();
  const x = getX(e);
  const dx = x - dragX;
  aimX = Math.max(0.1, Math.min(0.9, aimX + dx/W * 1.5));
  dragX = x;
  updateHand();
  drawScene();
}

function onUp(e) {
  if(phase !== 'aiming') return;
  phase = 'idle';
  throwBall();
}

function throwBall() {
  if(chances <= 0) return;
  chances--;
  updateChances();
  document.getElementById('dragLabel').style.display = 'none';

  winner = cups[Math.floor(Math.random() * cups.length)];
  const tgt = getCupPx(winner);
  const startX = aimX * W;
  const startY = H * 0.82;
  const bounceX = startX + (tgt.x - startX) * 0.45 + (Math.random()-0.5)*40;
  const bounceY = H * 0.58;

  ball = {x: startX, y: startY, scale: 1};
  trailPts = [];
  phase = 'flying';

  const T = 75;
  function animate(f) {
    trailPts.push({x:ball.x, y:ball.y});
    if(trailPts.length > 18) trailPts.shift();

    if(f < T/2) {
      const p = f/(T/2);
      const ep = p<0.5?2*p*p:-1+(4-2*p)*p;
      ball.x = startX + (bounceX-startX)*ep;
      ball.y = startY + (bounceY-startY)*ep - Math.sin(p*Math.PI)*90;
      ball.scale = 1 + 0.5*Math.sin(p*Math.PI);
    } else {
      const p = (f-T/2)/(T/2);
      const ep = p<0.5?2*p*p:-1+(4-2*p)*p;
      ball.x = bounceX + (tgt.x-bounceX)*ep;
      ball.y = bounceY + (tgt.y-bounceY)*ep - Math.sin(p*Math.PI)*50;
      ball.scale = 1.5 - 0.6*p;
    }

    drawScene();

    if(f >= T) {
      ball = {x:tgt.x, y:tgt.y, scale:0.9};
      winner.highlight = true;
      trailPts = [];
      drawScene();
      phase = 'done';
      setTimeout(() => showPrize(winner), 600);
      return;
    }
    requestAnimationFrame(() => animate(f+1));
  }
  animate(0);
}

function updateChances() {
  [0,1,2].forEach(i => {
    const el = document.getElementById('d'+i);
    if(el) el.classList.toggle('used', i >= chances);
  });
}

function showPrize(cup) {
  const modal = document.getElementById('prizeModal');
  const pb = document.getElementById('prizeBox');
  pb.style.borderColor = cup.prize.color;
  document.getElementById('prizeValue').textContent = cup.prize.prize;
  document.getElementById('prizeValue').style.color = cup.prize.color;
  document.getElementById('prizeDesc').textContent = cup.prize.desc;
  document.getElementById('prizeCupImg').src = BASE + 'cups.png';
  modal.classList.add('show');
}

function closePrize() {
  document.getElementById('prizeModal').classList.remove('show');
  winner.highlight = false;
  ball = null;
  trailPts = [];
  phase = 'idle';
  buildCups();
  if(chances > 0) {
    document.getElementById('dragLabel').style.display = 'flex';
  } else {
    document.getElementById('dragLabel').textContent = 'No more chances today!';
    document.getElementById('dragLabel').style.display = 'flex';
  }
  drawScene();
}

// Load images then draw
let loaded = 0;
[cupsImg, tableImg, ballImg].forEach(img => {
  img.onload = () => { loaded++; if(loaded >= 3) drawScene(); };
  img.onerror = () => { loaded++; if(loaded >= 3) drawScene(); };
});

updateHand();
drawScene();

// Animate glow on cups while idle
setInterval(() => {
  if(phase === 'idle') drawScene();
}, 1000/30);
</script>
</body>
</html>
