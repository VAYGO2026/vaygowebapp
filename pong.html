<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>VAYGO — Throw to Win</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;}

.app{
  width:100%;max-width:430px;height:100dvh;
  margin:0 auto;position:relative;overflow:hidden;
  background:#000;
  display:flex;flex-direction:column;
}

/* HEADER */
.hdr{
  flex-shrink:0;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  background:rgba(0,0,0,0.7);
  z-index:30;
  position:relative;
}
.hdr-back{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;cursor:pointer;text-decoration:none;background:rgba(0,0,0,0.5);}
.hdr-logo{text-align:center;}
.hdr-logo .n{font-family:'Anton',sans-serif;font-size:18px;color:#C9A84C;letter-spacing:4px;}
.hdr-logo .s{font-size:7px;color:rgba(255,255,255,0.4);letter-spacing:2px;}
.hdr-ch{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:4px 10px;text-align:center;}
.hdr-ch .cl{font-size:7px;color:rgba(255,255,255,0.5);letter-spacing:0.1em;display:block;margin-bottom:3px;}
.hdr-ch .cv{display:flex;gap:4px;justify-content:center;}
.cd{width:12px;height:12px;border-radius:50%;background:#C9A84C;box-shadow:0 0 5px #C9A84C;transition:all 0.3s;}
.cd.used{background:#333;box-shadow:none;}

/* ZONA SUPERIOR — fondo + vasos */
.top-zone{
  flex:1;position:relative;overflow:hidden;
  min-height:0;
}
.top-bg{position:absolute;inset:0;z-index:0;}
.top-bg img{width:100%;height:100%;object-fit:cover;object-position:center top;}
.top-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0.2) 0%,rgba(0,0,0,0.0) 50%,rgba(0,0,0,0.7) 100%);}

/* HERO TEXT */
.hero{position:absolute;top:10px;left:14px;z-index:10;}
.hero .t1{font-family:'Anton',sans-serif;font-size:28px;color:#fff;line-height:1;letter-spacing:1px;}
.hero .t2{font-family:'Anton',sans-serif;font-size:28px;color:#C9A84C;line-height:1;}
.hero .desc{font-size:10px;color:rgba(255,255,255,0.65);margin-top:4px;}

/* VASOS */
.cup{position:absolute;z-index:10;transform:translate(-50%,-50%);}
.cup img{display:block;mix-blend-mode:screen;width:100%;}

/* CANVAS sobre los vasos */
.top-canvas{position:absolute;inset:0;z-index:15;pointer-events:none;}

/* MESA */
.mesa-zone{
  flex-shrink:0;height:32%;position:relative;overflow:hidden;
}
.mesa-zone img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
/* Gradiente para fundir con zona superior */
.mesa-zone::before{content:'';position:absolute;top:0;left:0;right:0;height:30%;background:linear-gradient(180deg,rgba(0,0,0,0.8),transparent);z-index:2;}

/* ZONA INFERIOR — mano */
.bot-zone{
  flex-shrink:0;height:18%;
  background:#000;
  position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
}
.hand-wrap{position:absolute;top:-20px;left:50%;transform:translateX(-50%);z-index:20;mix-blend-mode:screen;}
.hand-wrap img{height:160px;display:block;mix-blend-mode:screen;}
.drag-lbl{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:0.12em;}

/* NAV */
.nav{
  flex-shrink:0;height:54px;
  background:rgba(0,0,0,0.92);
  border-top:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:space-around;
  z-index:30;
}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.ni .ico{font-size:15px;}
.ni span{font-size:7px;color:rgba(255,255,255,0.35);letter-spacing:0.06em;}
.nc{background:linear-gradient(180deg,#C9A84C,#8B6914);border-radius:50%;width:44px;height:44px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:-12px;box-shadow:0 0 0 3px #000,0 0 0 4px rgba(201,168,76,0.4);}
.nc .ico{font-size:14px;}
.nc .lbl{font-size:7px;color:#fff;font-weight:700;letter-spacing:0.06em;}

/* PRIZE MODAL */
.pm{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.9);}
.pm.show{display:flex;}
.pb{background:#0D1520;border-radius:22px;padding:24px 20px;text-align:center;width:280px;border:2px solid #C9A84C;}
.pb .pcup{width:120px;height:140px;object-fit:contain;margin:0 auto 10px;mix-blend-mode:screen;}
.pb .plbl{font-size:9px;color:#8BB8D8;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px;}
.pb .pval{font-family:'Anton',sans-serif;font-size:36px;line-height:1;margin-bottom:4px;}
.pb .pdesc{font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:16px;}
.pb .pbtn{background:linear-gradient(180deg,#C9A84C,#8B6914);border:none;border-radius:50px;padding:12px 0;color:#fff;font-family:'Anton',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;width:100%;box-shadow:0 4px 0 #5A4008;}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- HEADER -->
  <div class="hdr">
    <a href="app.html" class="hdr-back">&#8249;</a>
    <div class="hdr-logo"><div class="n">VAYGO</div><div class="s">EXPLORE COZUMEL DIFFERENTLY</div></div>
    <div class="hdr-ch">
      <span class="cl">CHANCES</span>
      <div class="cv">
        <div class="cd" id="d0"></div>
        <div class="cd" id="d1"></div>
        <div class="cd" id="d2"></div>
      </div>
    </div>
  </div>

  <!-- ZONA SUPERIOR con fondo y vasos -->
  <div class="top-zone" id="topZone">
    <div class="top-bg">
      <img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/bg-pong.png" alt=""/>
    </div>

    <!-- TEXTO -->
    <div class="hero">
      <div class="t1">THROW</div>
      <div class="t2">TO WIN</div>
      <div class="desc">Bounce the ball and land it in a cup!</div>
    </div>

    <!-- VASOS ROW 1: 5 vasos -->
    <div class="cup" id="c0" style="left:12%;top:38%;width:17%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup1.png"/></div>
    <div class="cup" id="c1" style="left:28%;top:30%;width:17%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup2.png"/></div>
    <div class="cup" id="c2" style="left:50%;top:24%;width:17%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup3.png"/></div>
    <div class="cup" id="c3" style="left:72%;top:30%;width:17%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup4.png"/></div>
    <div class="cup" id="c4" style="left:88%;top:38%;width:17%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup5.png"/></div>
    <!-- VASOS ROW 2: 3 vasos -->
    <div class="cup" id="c5" style="left:28%;top:60%;width:19%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup6.png"/></div>
    <div class="cup" id="c6" style="left:50%;top:54%;width:21%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup7.png"/></div>
    <div class="cup" id="c7" style="left:72%;top:60%;width:19%;"><img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/cup8.png"/></div>

    <!-- CANVAS -->
    <canvas class="top-canvas" id="gc"></canvas>
  </div>

  <!-- MESA -->
  <div class="mesa-zone">
    <img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/table.png" alt="table"/>
  </div>

  <!-- ZONA INFERIOR con mano -->
  <div class="bot-zone" id="botZone">
    <div class="hand-wrap" id="handEl">
      <img src="https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/hand.png" alt="hand"/>
    </div>
    <div class="drag-lbl">← &nbsp; DRAG TO AIM &nbsp; →</div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <div class="ni" onclick="location.href='explore.html'"><div class="ico">🧭</div><span>EXPLORE</span></div>
    <div class="ni"><div class="ico">🎁</div><span>REWARDS</span></div>
    <div class="nc"><div class="ico">🏆</div><div class="lbl">PLAY</div></div>
    <div class="ni" onclick="location.href='app.html'"><div class="ico">📍</div><span>MAP</span></div>
    <div class="ni"><div class="ico">👤</div><span>PROFILE</span></div>
  </div>

  <!-- PRIZE MODAL -->
  <div class="pm" id="pm">
    <div class="pb" id="pb">
      <img class="pcup" id="pcup" src="" alt=""/>
      <div class="plbl">YOUR PRIZE</div>
      <div class="pval" id="pval">FREE DRINK</div>
      <div class="pdesc" id="pdesc">Show this to the staff</div>
      <button class="pbtn" onclick="closePrize()">AWESOME! 🎉</button>
    </div>
  </div>

</div>

<script>
const BASE = 'https://raw.githubusercontent.com/VAYGO2026/vaygowebapp/main/';

const PRIZES = [
  {p:'FREE DRINK',     c:'#9B59FF', d:'Enjoy a free drink on the house!', s:BASE+'cup1.png'},
  {p:'10% OFF',        c:'#3A7FFF', d:'Get 10% off your entire bill!',     s:BASE+'cup2.png'},
  {p:'PREMIUM DESSERT',c:'#FF9500', d:'A premium dessert on us!',          s:BASE+'cup3.png'},
  {p:'SPECIAL EXP.',   c:'#00E5CC', d:'Unlock a special experience!',      s:BASE+'cup4.png'},
  {p:'20% OFF',        c:'#FF3333', d:'Get 20% off your bill!',            s:BASE+'cup5.png'},
  {p:'FREE APPETIZER', c:'#33CC33', d:'Enjoy a free appetizer!',           s:BASE+'cup6.png'},
  {p:'VIP ACCESS',     c:'#FF4400', d:'Unlock VIP treatment tonight!',     s:BASE+'cup7.png'},
  {p:'SPIN AGAIN',     c:'#CC44FF', d:'Try your luck one more time!',      s:BASE+'cup8.png'},
];

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const topZone = document.getElementById('topZone');

function resizeCanvas(){
  canvas.width = topZone.clientWidth;
  canvas.height = topZone.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); draw(); });

let chances=3, phase='idle', aimX=0.5, isDrag=false, lastX=0, ball=null, trail=[], winner=-1;

function cupCenter(i) {
  const el = document.getElementById('c'+i);
  if(!el) return {x:canvas.width/2, y:canvas.height/2};
  const r = el.getBoundingClientRect();
  const t = topZone.getBoundingClientRect();
  return {x: r.left-t.left+r.width/2, y: r.top-t.top+r.height/2};
}

function moveHand(ax) {
  const hand = document.getElementById('handEl');
  const W = document.getElementById('app').clientWidth;
  const off = (ax - 0.5) * W * 0.5;
  hand.style.transform = `translateX(calc(-50% + ${off}px))`;
}

function updChances(){
  [0,1,2].forEach(i=>{
    const d=document.getElementById('d'+i);
    if(d) d.classList.toggle('used',i>=chances);
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Aim line
  if(phase==='idle'){
    const sx=aimX*canvas.width, sy=canvas.height*0.95;
    const ex=canvas.width*0.5, ey=canvas.height*0.55;
    ctx.save();
    ctx.setLineDash([7,5]);
    ctx.strokeStyle='rgba(255,220,100,0.3)';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(sx,sy);
    ctx.quadraticCurveTo(sx*0.6+ex*0.4,sy-60,ex,ey);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // Trail
  if(trail.length>1){
    ctx.save();
    ctx.setLineDash([6,5]);
    for(let i=1;i<trail.length;i++){
      const p=i/trail.length;
      ctx.beginPath();
      ctx.moveTo(trail[i-1].x,trail[i-1].y);
      ctx.lineTo(trail[i].x,trail[i].y);
      ctx.strokeStyle=`rgba(255,220,100,${p*0.8})`;
      ctx.lineWidth=p*4;
      ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();
  }

  // Ball
  if(ball){
    ctx.save();
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
    ctx.fillStyle='#F0EDE8';
    ctx.fill();
    ctx.restore();
  }
}

function launch(){
  if(chances<=0||phase!=='idle') return;
  chances--; updChances();
  phase='flying';
  winner=Math.floor(Math.random()*8);
  const tgt=cupCenter(winner);
  const sx=aimX*canvas.width, sy=canvas.height*0.95;
  const bx=sx+(tgt.x-sx)*0.4+(Math.random()-.5)*25;
  const by=canvas.height*0.55;
  ball={x:sx,y:sy,r:13}; trail=[];
  const T=75; let f=0;
  function anim(){
    trail.push({x:ball.x,y:ball.y});
    if(trail.length>18) trail.shift();
    if(f<T/2){
      const p=f/(T/2), e=p<.5?2*p*p:-1+(4-2*p)*p;
      ball.x=sx+(bx-sx)*e;
      ball.y=sy+(by-sy)*e-Math.sin(p*Math.PI)*90;
      ball.r=13+5*Math.sin(p*Math.PI);
    } else {
      const p=(f-T/2)/(T/2), e=p<.5?2*p*p:-1+(4-2*p)*p;
      ball.x=bx+(tgt.x-bx)*e;
      ball.y=by+(tgt.y-by)*e-Math.sin(p*Math.PI)*45;
      ball.r=18-6*p;
    }
    draw(); f++;
    if(f>=T){
      ball=null; trail=[]; phase='done';
      const ce=document.getElementById('c'+winner);
      if(ce){ ce.style.filter=`brightness(1.6) drop-shadow(0 0 18px ${PRIZES[winner].c})`; ce.style.transform='translate(-50%,-50%) scale(1.18)'; }
      setTimeout(()=>showPrize(winner),500);
      return;
    }
    requestAnimationFrame(anim);
  }
  anim();
}

function showPrize(i){
  const pr=PRIZES[i];
  document.getElementById('pb').style.borderColor=pr.c;
  document.getElementById('pval').textContent=pr.p;
  document.getElementById('pval').style.color=pr.c;
  document.getElementById('pdesc').textContent=pr.d;
  document.getElementById('pcup').src=pr.s;
  document.getElementById('pm').classList.add('show');
}

function closePrize(){
  document.getElementById('pm').classList.remove('show');
  const ce=document.getElementById('c'+winner);
  if(ce){ ce.style.filter=''; ce.style.transform='translate(-50%,-50%)'; }
  ball=null; trail=[]; phase='idle'; draw();
}

// TOUCH/MOUSE en toda la app
const app=document.getElementById('app');
app.addEventListener('touchstart',e=>{if(phase!=='idle')return;e.preventDefault();isDrag=true;lastX=e.touches[0].clientX;},{passive:false});
app.addEventListener('touchmove',e=>{if(!isDrag)return;e.preventDefault();const dx=e.touches[0].clientX-lastX;lastX=e.touches[0].clientX;aimX=Math.max(.06,Math.min(.94,aimX+dx/app.clientWidth));moveHand(aimX);draw();},{passive:false});
app.addEventListener('touchend',e=>{if(!isDrag)return;isDrag=false;if(phase==='idle'&&chances>0)launch();});
app.addEventListener('mousedown',e=>{if(phase!=='idle')return;isDrag=true;lastX=e.clientX;});
app.addEventListener('mousemove',e=>{if(!isDrag)return;const dx=e.clientX-lastX;lastX=e.clientX;aimX=Math.max(.06,Math.min(.94,aimX+dx/app.clientWidth));moveHand(aimX);draw();});
app.addEventListener('mouseup',()=>{if(!isDrag)return;isDrag=false;if(phase==='idle'&&chances>0)launch();});

moveHand(aimX);
updChances();
setInterval(()=>{if(phase==='idle')draw();},1000/30);
</script>
</body>
</html>
