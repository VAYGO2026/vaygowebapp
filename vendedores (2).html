<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VAYGO — Panel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060E1C;font-family:'DM Sans',sans-serif;min-height:100vh;}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:#0D1E35;border:1px solid #1A2E4A;border-radius:24px;padding:40px 30px;width:100%;max-width:360px;text-align:center;}
.login-logo{font-family:'Anton',sans-serif;font-size:36px;color:#fff;letter-spacing:3px;margin-bottom:4px;}
.login-logo span{color:#FF2D7A;}
.login-sub{font-size:12px;color:#4B6A85;margin-bottom:30px;letter-spacing:0.1em;text-transform:uppercase;}
.login-input{width:100%;background:#0A1628;border:1px solid #1A2E4A;border-radius:12px;padding:14px 16px;color:#fff;font-size:14px;margin-bottom:12px;outline:none;}
.login-input:focus{border-color:#FF2D7A;}
.login-btn{width:100%;background:linear-gradient(180deg,#FF2D7A,#C4004A);border:none;border-radius:12px;padding:14px;color:#fff;font-family:'Anton',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;}
.login-error{color:#FF2D7A;font-size:12px;margin-top:8px;display:none;}
.panel{display:none;padding:20px;max-width:800px;margin:0 auto;}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.panel-logo{font-family:'Anton',sans-serif;font-size:24px;color:#fff;letter-spacing:2px;}
.panel-logo span{color:#FF2D7A;}
.panel-logout{background:transparent;border:1px solid #1A2E4A;border-radius:10px;padding:6px 14px;color:#4B6A85;font-size:12px;cursor:pointer;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:#0D1E35;border:1px solid #1A2E4A;border-radius:14px;padding:14px;text-align:center;}
.stat-num{font-family:'Anton',sans-serif;font-size:28px;}
.stat-num.green{color:#7FC142;}
.stat-num.red{color:#FF2D7A;}
.stat-num.yellow{color:#FF8C00;}
.stat-num.blue{color:#4FA3E8;}
.stat-label{font-size:10px;color:#4B6A85;text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}
.top-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.tabs{display:flex;gap:8px;flex-wrap:wrap;}
.tab{background:#0D1E35;border:1px solid #1A2E4A;border-radius:20px;padding:6px 16px;font-size:12px;font-weight:600;color:#4B6A85;cursor:pointer;}
.tab.active{background:rgba(255,45,122,0.15);border-color:#FF2D7A;color:#FF2D7A;}
.add-btn{background:linear-gradient(90deg,#FF2D7A,#FF8C00);border:none;border-radius:20px;padding:8px 20px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}
.venues-list{display:flex;flex-direction:column;gap:12px;}
.venue-card{background:#0D1E35;border:1px solid #1A2E4A;border-radius:16px;padding:16px;}
.venue-card.status-active{border-color:rgba(127,193,66,0.35);}
.venue-card.status-trial{border-color:rgba(79,163,232,0.35);}
.venue-card.status-warning{border-color:rgba(255,140,0,0.4);}
.venue-card.status-suspended{border-color:rgba(255,45,122,0.35);opacity:0.75;}
.venue-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.venue-name{font-size:15px;font-weight:700;color:#fff;}
.venue-cat{font-size:11px;color:#4B6A85;margin-top:2px;}
.right-badges{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.plan-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;}
.plan-card-b{background:rgba(79,163,232,0.15);color:#4FA3E8;}
.plan-banner-b{background:rgba(255,140,0,0.15);color:#FF8C00;}
.plan-trial-b{background:rgba(127,193,66,0.15);color:#7FC142;}
.status-badge{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-green{background:#7FC142;}
.dot-yellow{background:#FF8C00;animation:pulse 1.5s infinite;}
.dot-red{background:#FF2D7A;}
.dot-blue{background:#4FA3E8;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.2;}}
.venue-dates{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.date-box{background:#0A1628;border-radius:10px;padding:8px 10px;}
.date-lbl{font-size:9px;color:#4B6A85;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px;}
.date-val{font-size:12px;font-weight:600;color:#fff;}
.date-val.warn{color:#FF8C00;}
.date-val.exp{color:#FF2D7A;}
.venue-actions{display:flex;gap:6px;flex-wrap:wrap;}
.abtn{flex:1;min-width:70px;display:flex;align-items:center;justify-content:center;gap:4px;border:none;border-radius:10px;padding:8px 8px;font-size:11px;font-weight:700;cursor:pointer;}
.abtn-wa{background:rgba(37,211,102,0.12);color:#25D366;border:1px solid rgba(37,211,102,0.25);}
.abtn-on{background:rgba(127,193,66,0.12);color:#7FC142;border:1px solid rgba(127,193,66,0.25);}
.abtn-off{background:rgba(255,45,122,0.12);color:#FF2D7A;border:1px solid rgba(255,45,122,0.25);}
.abtn-renew{background:rgba(255,140,0,0.12);color:#FF8C00;border:1px solid rgba(255,140,0,0.25);}
.abtn-edit{background:rgba(79,163,232,0.12);color:#4FA3E8;border:1px solid rgba(79,163,232,0.25);}
.empty{text-align:center;padding:40px;color:#4B6A85;font-size:13px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:#0D1E35;border:1px solid #1A2E4A;border-radius:24px;padding:24px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Anton',sans-serif;font-size:20px;color:#fff;letter-spacing:1px;margin-bottom:20px;}
.fg{margin-bottom:14px;}
.fl{font-size:11px;color:#4B6A85;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;display:block;}
.fi,.fs{width:100%;background:#0A1628;border:1px solid #1A2E4A;border-radius:10px;padding:10px 14px;color:#fff;font-size:13px;outline:none;font-family:'DM Sans',sans-serif;}
.fi:focus,.fs:focus{border-color:#FF2D7A;}
.fs option{background:#0A1628;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.msave{flex:1;background:linear-gradient(180deg,#FF2D7A,#C4004A);border:none;border-radius:12px;padding:12px;color:#fff;font-family:'Anton',sans-serif;font-size:16px;letter-spacing:1px;cursor:pointer;}
.mcancel{background:transparent;border:1px solid #1A2E4A;border-radius:12px;padding:12px 20px;color:#4B6A85;font-size:13px;cursor:pointer;}
@media(max-width:480px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .venue-dates{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">VAY<span>GO</span></div>
    <div class="login-sub">Panel de Administración</div>
    <input class="login-input" type="password" id="loginPass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">ENTRAR</button>
    <div class="login-error" id="loginError">Contraseña incorrecta</div>
  </div>
</div>

<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-logo">VAY<span>GO</span> <span style="font-size:13px;color:#4B6A85;font-family:'DM Sans',sans-serif;font-weight:600;">ADMIN</span></div>
    <button class="panel-logout" onclick="doLogout()">Cerrar sesión</button>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num green" id="sActive">0</div><div class="stat-label">Activos</div></div>
    <div class="stat-card"><div class="stat-num yellow" id="sWarn">0</div><div class="stat-label">Por vencer</div></div>
    <div class="stat-card"><div class="stat-num red" id="sSusp">0</div><div class="stat-label">Suspendidos</div></div>
    <div class="stat-card"><div class="stat-num blue" id="sRev">$0</div><div class="stat-label">MXN / mes</div></div>
  </div>
  <div class="top-bar">
    <div class="tabs">
      <div class="tab active" onclick="setTab('all',this)">Todos</div>
      <div class="tab" onclick="setTab('active',this)">✅ Activos</div>
      <div class="tab" onclick="setTab('trial',this)">🎁 Prueba</div>
      <div class="tab" onclick="setTab('warning',this)">⚠️ Por vencer</div>
      <div class="tab" onclick="setTab('suspended',this)">🔴 Suspendidos</div>
    </div>
    <button class="add-btn" onclick="openModal()">+ Nuevo Venue</button>
  </div>
  <div class="venues-list" id="venuesList"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Agregar Venue</div>
    <div class="fg"><label class="fl">Nombre del Venue</label><input class="fi" id="fName" placeholder="Ej: Bajau Steakhouse"/></div>
    <div class="fg"><label class="fl">Categoría</label>
      <select class="fs" id="fCat">
        <option value="EAT">🍴 EAT</option>
        <option value="DRINK">🍹 DRINK</option>
        <option value="SHOP">🛍️ SHOP</option>
        <option value="TOURS">🗺️ TOURS</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Plan</label>
      <select class="fs" id="fPlan">
        <option value="trial">🎁 Prueba gratuita</option>
        <option value="card_top">🃏 Card Top (pos. 1-4) — $2,500 MXN/mes 🔥</option>
        <option value="card_std">🃏 Card Standard (pos. 5+) — $2,000 MXN/mes 🔥</option>
        <option value="banner_top">🏆 Banner Top (pos. 1-3) — $3,000 MXN/mes 🔥</option>
        <option value="banner_std">🏆 Banner Standard (pos. 4+) — $2,500 MXN/mes 🔥</option>
      </select>
    </div>
    <div class="fg"><label class="fl">WhatsApp (con código país, ej: 529871234567)</label><input class="fi" id="fPhone" placeholder="529871234567"/></div>
    <div class="fg"><label class="fl">Fecha de inicio</label><input class="fi" type="date" id="fStart"/></div>
    <div class="fg"><label class="fl">Status</label>
      <select class="fs" id="fStatus">
        <option value="trial">🎁 Prueba gratuita</option>
        <option value="active">✅ Activo (pagó)</option>
        <option value="suspended">🔴 Suspendido</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="mcancel" onclick="closeModal()">Cancelar</button>
      <button class="msave" onclick="saveVenue()">GUARDAR</button>
    </div>
  </div>
</div>

<script>
const PASS = 'vaygo2026';
const KEY = 'vaygo_venues_v2';
let currentTab = 'all';
let editId = null;

function doLogin() {
  if(document.getElementById('loginPass').value === PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    render();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('panel').style.display = 'none';
  document.getElementById('loginPass').value = '';
}

function getVenues() {
  try {
    const d = localStorage.getItem(KEY);
    return d ? JSON.parse(d) : initVenues();
  } catch(e) { return initVenues(); }
}

function saveVenues(v) { localStorage.setItem(KEY, JSON.stringify(v)); }

function today() { return new Date().toISOString().split('T')[0]; }

function addDays(s, n) {
  const d = new Date(s); d.setDate(d.getDate()+n);
  return d.toISOString().split('T')[0];
}

function daysLeft(s) {
  const a = new Date(today()), b = new Date(s);
  return Math.ceil((b-a)/86400000);
}

function getExpiry(v) {
  if(v.status === 'trial' || v.status === 'suspended') return null;
  return addDays(v.start, 30);
}

function getStatusClass(v) {
  if(v.status === 'suspended') return 'suspended';
  if(v.status === 'trial') return 'trial';
  const exp = getExpiry(v);
  if(!exp) return 'trial';
  const d = daysLeft(exp);
  if(d < 0) return 'suspended';
  if(d <= 5) return 'warning';
  return 'active';
}

function getStatusLabel(v) {
  const sc = getStatusClass(v);
  if(sc === 'suspended') return {txt:'Suspendido', color:'#FF2D7A', dot:'dot-red'};
  if(sc === 'trial') return {txt:'Prueba gratuita', color:'#4FA3E8', dot:'dot-blue'};
  if(sc === 'warning') {
    const d = daysLeft(getExpiry(v));
    return {txt:`Vence en ${d} día${d===1?'':'s'}`, color:'#FF8C00', dot:'dot-yellow'};
  }
  return {txt:'Activo', color:'#7FC142', dot:'dot-green'};
}

function planPrice(p) { return p==='card_top'?2500:p==='card_std'?2000:p==='banner_top'?3000:p==='banner_std'?2500:0; }
function planLabel(p) { return p==='card_top'?'🃏 Card Top 🔥':p==='card_std'?'🃏 Card 🔥':p==='banner_top'?'🏆 Banner Top 🔥':p==='banner_std'?'🏆 Banner 🔥':'🎁 Prueba'; }
function planBadgeClass(p) { return p==='card_top'||p==='card_std'?'plan-card-b':p==='banner_top'||p==='banner_std'?'plan-banner-b':'plan-trial-b'; }

function initVenues() {
  const t = today();
  const venues = [
    {id:1,  name:'Aquí + Ahora Coffee',    cat:'EAT',   plan:'trial', phone:'',            start:t, status:'trial'},
    {id:2,  name:'Maple Bakehouse Café',   cat:'EAT',   plan:'trial', phone:'',            start:t, status:'trial'},
    {id:3,  name:'Coffee Bean',            cat:'EAT',   plan:'trial', phone:'',            start:t, status:'trial'},
    {id:4,  name:'Café de Isla',           cat:'EAT',   plan:'trial', phone:'',            start:t, status:'trial'},
    {id:5,  name:'Sucré / Salé Café',      cat:'EAT',   plan:'trial', phone:'',            start:t, status:'trial'},
    {id:6,  name:'Corazón Contento',       cat:'EAT',   plan:'trial', phone:'',            start:t, status:'trial'},
    {id:7,  name:'Bajau Steakhouse',       cat:'EAT',   plan:'trial', phone:'',            start:t, status:'trial'},
    {id:8,  name:'Buccanos',               cat:'EAT',   plan:'trial', phone:'',            start:t, status:'trial'},
    {id:9,  name:'Guidos',                 cat:'EAT',   plan:'trial', phone:'',            start:t, status:'trial'},
    {id:10, name:'987 Cocina & Cocktails', cat:'DRINK', plan:'trial', phone:'',            start:t, status:'trial'},
    {id:11, name:'Okumi',                  cat:'DRINK', plan:'banner',phone:'',            start:t, status:'active'},
    {id:12, name:'Azul Madera',            cat:'EAT',   plan:'trial', phone:'',            start:t, status:'trial'},
    {id:13, name:'10 Experiences',         cat:'TOURS', plan:'trial', phone:'',            start:t, status:'trial'},
  ];
  saveVenues(venues);
  return venues;
}

function render() {
  const venues = getVenues();
  // Stats
  let active=0, warn=0, susp=0, rev=0;
  venues.forEach(v => {
    const sc = getStatusClass(v);
    if(sc==='active'||sc==='trial') active++;
    else if(sc==='warning'){warn++;rev+=planPrice(v.plan);}
    else if(sc==='suspended') susp++;
    if(sc==='active') rev+=planPrice(v.plan);
  });
  document.getElementById('sActive').textContent = active;
  document.getElementById('sWarn').textContent = warn;
  document.getElementById('sSusp').textContent = susp;
  document.getElementById('sRev').textContent = '$'+rev.toLocaleString();

  // Filter
  let list = venues;
  if(currentTab==='active') list = venues.filter(v=>getStatusClass(v)==='active');
  else if(currentTab==='trial') list = venues.filter(v=>getStatusClass(v)==='trial');
  else if(currentTab==='warning') list = venues.filter(v=>getStatusClass(v)==='warning');
  else if(currentTab==='suspended') list = venues.filter(v=>getStatusClass(v)==='suspended');

  const el = document.getElementById('venuesList');
  if(!list.length){el.innerHTML='<div class="empty">No hay venues en esta categoría</div>';return;}

  el.innerHTML = list.map(v => {
    const sc = getStatusClass(v);
    const sl = getStatusLabel(v);
    const exp = getExpiry(v);
    const expStr = exp || '—';
    const dl = exp ? daysLeft(exp) : null;
    const expClass = dl!==null?(dl<0?'exp':dl<=5?'warn':''):'';
    const price = planPrice(v.plan);

    const msg = encodeURIComponent(
      `Hola ${v.name}! 👋\n\nTe escribimos de *VAYGO* 🎰\n\nTu suscripción *${planLabel(v.plan)}* está lista para ${v.status==='trial'?'iniciar':'renovar'} por *$${price.toLocaleString()} MXN/mes*.\n\nPaga aquí 👉 https://link.mercadopago.com.mx/vaygo\n\n⚠️ Si no realizas el pago en 5 días, tu venue se pausará automáticamente en la app.\n\n¡Gracias por ser parte de VAYGO! 🚀`
    );
    const waLink = v.phone ? `https://wa.me/${v.phone.replace(/\D/g,'')}?text=${msg}` : `https://wa.me/?text=${msg}`;

    return `<div class="venue-card status-${sc}">
      <div class="venue-top">
        <div>
          <div class="venue-name">${v.name}</div>
          <div class="venue-cat">${v.cat}</div>
        </div>
        <div class="right-badges">
          <span class="plan-badge ${planBadgeClass(v.plan)}">${planLabel(v.plan)}</span>
          <div class="status-badge">
            <div class="dot ${sl.dot}"></div>
            <span style="color:${sl.color}">${sl.txt}</span>
          </div>
        </div>
      </div>
      <div class="venue-dates">
        <div class="date-box"><div class="date-lbl">Registrado</div><div class="date-val">${v.start}</div></div>
        <div class="date-box"><div class="date-lbl">Vencimiento</div><div class="date-val ${expClass}">${v.status==='trial'?'En prueba':expStr}</div></div>
        <div class="date-box"><div class="date-lbl">Mensualidad</div><div class="date-val">${price>0?'$'+price.toLocaleString()+' MXN':'Gratis'}</div></div>
      </div>
      <div class="venue-actions">
        <button class="abtn abtn-wa" onclick="window.open('${waLink}','_blank')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.852L.057 23.57a.75.75 0 00.927.928l5.718-1.475A11.952 11.952 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.697-.504-5.241-1.385l-.375-.217-3.894 1.004 1.004-3.894-.217-.375A9.956 9.956 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
          WhatsApp
        </button>
        ${sc!=='active'&&sc!=='trial'?`<button class="abtn abtn-on" onclick="activate(${v.id})">✅ Activar</button>`:''}
        ${sc==='active'?`<button class="abtn abtn-off" onclick="suspend(${v.id})">⏸ Pausar</button>`:''}
        ${sc==='trial'?`<button class="abtn abtn-on" onclick="activate(${v.id})">✅ Confirmar pago</button>`:''}
        ${sc==='suspended'?`<button class="abtn abtn-renew" onclick="activate(${v.id})">🔄 Reactivar</button>`:''}
        <button class="abtn abtn-edit" onclick="editVenue(${v.id})">✏️ Editar</button>
      </div>
    </div>`;
  }).join('');
}

function setTab(t, el) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  render();
}

function activate(id) {
  const v = getVenues(); const item = v.find(x=>x.id===id);
  if(!item) return;
  item.status = 'active'; item.start = today();
  saveVenues(v); render();
}

function suspend(id) {
  const v = getVenues(); const item = v.find(x=>x.id===id);
  if(!item) return;
  item.status = 'suspended';
  saveVenues(v); render();
}

function openModal(id=null) {
  editId = id;
  document.getElementById('modalTitle').textContent = id ? 'Editar Venue' : 'Nuevo Venue';
  if(id) {
    const v = getVenues().find(x=>x.id===id);
    if(!v) return;
    document.getElementById('fName').value = v.name;
    document.getElementById('fCat').value = v.cat;
    document.getElementById('fPlan').value = v.plan;
    document.getElementById('fPhone').value = v.phone||'';
    document.getElementById('fStart').value = v.start;
    document.getElementById('fStatus').value = v.status;
  } else {
    document.getElementById('fName').value='';
    document.getElementById('fCat').value='EAT';
    document.getElementById('fPlan').value='trial';
    document.getElementById('fPhone').value='';
    document.getElementById('fStart').value=today();
    document.getElementById('fStatus').value='trial';
  }
  document.getElementById('modalOverlay').classList.add('show');
}

function editVenue(id){ openModal(id); }

function closeModal(){ document.getElementById('modalOverlay').classList.remove('show'); editId=null; }

function saveVenue() {
  const name = document.getElementById('fName').value.trim();
  if(!name){alert('Ingresa el nombre del venue');return;}
  const venues = getVenues();
  if(editId) {
    const v = venues.find(x=>x.id===editId);
    if(v){
      v.name=name; v.cat=document.getElementById('fCat').value;
      v.plan=document.getElementById('fPlan').value;
      v.phone=document.getElementById('fPhone').value.trim();
      v.start=document.getElementById('fStart').value;
      v.status=document.getElementById('fStatus').value;
    }
  } else {
    venues.push({
      id: Math.max(...venues.map(x=>x.id),0)+1,
      name, cat:document.getElementById('fCat').value,
      plan:document.getElementById('fPlan').value,
      phone:document.getElementById('fPhone').value.trim(),
      start:document.getElementById('fStart').value,
      status:document.getElementById('fStatus').value
    });
  }
  saveVenues(venues); closeModal(); render();
}

document.getElementById('fStart').value = today();
</script>
</body>
</html>
